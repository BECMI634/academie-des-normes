
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>L'Académie des Normes</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
<h1>🎓 L’Académie des Normes</h1>
<p>Mission : restaurer les règles typographiques</p>
</header>

<nav>
<button onclick="showScreen('carte')">Carte</button>
<button onclick="showScreen('entrainement')">Entraînement</button>
<button onclick="showScreen('profil')">Profil élève</button>
</nav>

<section id="carte" class="screen">
<h2>🗺 Carte de l’Académie</h2>
<div class="map">
<button onclick="startLevel(1)">L’Imprimerie</button>
<button onclick="startLevel(2)">Les Archives</button>
<button onclick="startLevel(3)">Salle du courrier</button>
</div>
</section>

<section id="entrainement" class="screen hidden">
<h2>⚙ Entraînement</h2>
<p>Corrige la phrase :</p>

<div id="question"></div>

<div id="answers"></div>

<div id="feedback"></div>

<button onclick="nextQuestion()">Question suivante</button>
</section>

<section id="profil" class="screen hidden">
<h2>👤 Profil élève</h2>
<p>Score : <span id="score">0</span></p>
<p>Niveau atteint : <span id="level">1</span></p>
</section>

<script src="script.js"></script>

</body>
</html>
